<!DOCTYPE html>
<html lang="{{ session.get('lang', 'en') }}" dir="{{ 'rtl' if session.get('lang') == 'ar' else 'ltr' }}">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('Welcome') }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/my_logo.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Engagement&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body { height: 100%; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px 16px;
        }

        /* RTL specific styles */
        [dir="rtl"] .form-group input {
            padding-right: 12px;
            padding-left: 40px;
            text-align: right;
        }

        [dir="rtl"] .password-toggle {
            right: auto;
            left: 12px;
        }

        [dir="rtl"] .remember-me input {
            margin-right: 0;
            margin-left: 8px;
        }

        [dir="rtl"] .forgot-password {
            text-align: left;
        }

        .login-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
        }

        .login-card .logo-container {
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card img.logo {
            max-width: 100%;
            height: auto;
            max-height: 120px;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 4px;
            color: #333;
            font-weight: 400;
            font-size: 2.4rem;
            font-family: "Engagement", cursive;
        }

        .lang-toggle {
            text-decoration: none;
            color: #333;
            font-weight: normal;
            margin: 0 10px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .lang-toggle:hover {
            background-color: #007bff;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            padding-right: 44px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.12);
            background: #fff;
        }

        .login-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: inherit;
            transition: background-color 0.2s ease, transform 0.1s;
            margin-top: 4px;
        }

        .login-button:hover { background-color: #0056b3; }
        .login-button:active { transform: scale(0.98); }

        .error-message {
            color: #dc3545;
            margin-top: 15px;
            text-align: center;
            font-size: clamp(0.8em, 2vw, 0.9em);
            padding: 10px;
            background-color: #f8d7da;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .tenant-info {
            display: none; /* Always hide the tenant info */
        }

        .db-key-group {
            display: none; /* Hide the database key input field */
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            font-size: 1.2em;
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            z-index: 2;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .remember-me input {
            margin-right: 8px;
        }

        .remember-me label {
            font-size: 0.9em;
            color: #555;
        }

        .forgot-password {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #007bff;
            text-decoration: none;
            font-size: 0.9em;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* ── Mobile: card covers full viewport ── */
        @media (max-width: 600px) {
            body {
                padding: 0;
                background: #fff;
                display: block;        /* let the card handle positioning */
            }

            .login-card {
                /* Cover every pixel of the screen — no flex tricks needed */
                position: fixed;
                inset: 0;              /* top:0; right:0; bottom:0; left:0 */
                border-radius: 0;
                box-shadow: none;
                padding: 60px 28px 40px;
                max-width: 100%;
                width: 100%;
                overflow-y: auto;      /* scroll if keyboard pushes content */
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .login-card img.logo { max-height: 100px; }

            .login-card h2 {
                font-size: 2.6rem;
                margin-bottom: 6px;
            }

            .form-group input {
                padding: 15px 16px;
                padding-right: 46px;
                font-size: 1.05rem;
            }

            .login-button {
                padding: 16px;
                font-size: 1.1rem;
            }
        }

        @media (max-height: 600px) and (max-width: 600px) {
            .login-card {
                padding: 20px 24px;
                justify-content: flex-start;
            }
            .login-card img.logo { max-height: 60px; }
            .login-card h2 { font-size: 2rem; }
        }
    </style>
    <script>
        function checkUsername(username) {
            if (username.length < 2) {
                return;
            }

            console.log('Checking username:', username);  // Debug log

            const requestData = {
                username: username
            };
            console.log('Sending request data:', requestData);  // Debug log

            // Get CSRF token from the hidden input
            const csrfToken = document.querySelector('input[name="csrf_token"]').value;
            console.log('CSRF Token:', csrfToken);  // Debug log

            fetch('/auth/check_username', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                console.log('Response status:', response.status);  // Debug log
                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(err.error || 'Network response was not ok');
                    });
                }
                return response.json();
            })
            .then(data => {
                console.log('Received data:', data);  // Debug log
                const dbKeyInput = document.getElementById('db_key');
                if (data.tenant && data.tenant.db_key) {
                    console.log('Setting database key to:', data.tenant.db_key);
                    dbKeyInput.value = data.tenant.db_key;
                } else {
                    console.log('No tenant found, using default database key');
                    dbKeyInput.value = 'default';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                const dbKeyInput = document.getElementById('db_key');
                dbKeyInput.value = 'default';
            });
        }

        function validateForm() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const dbKey = document.getElementById('db_key').value;
            
            console.log('Form submission - Username:', username, 'Database Key:', dbKey);  // Debug log
            
            if (!username) {
                alert('Please enter your username');
                return false;
            }
            
            if (!password) {
                alert('Please enter your password');
                return false;
            }
            
            return true;
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '👁️';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '🔒';
            }
        }

        // Set default database key when the page loads
        document.addEventListener('DOMContentLoaded', function() {
            const dbKeyInput = document.getElementById('db_key');
            dbKeyInput.value = 'default';
        });
    </script>
</head>
<body>
    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/my_logo.png') }}" alt="Logo" class="logo">
        </div>
        <h2>{{ _('Welcome') }}</h2>
        <div style="margin-top: 5px; text-align: center;">
            <a href="/change_lang/en" class="lang-toggle">EN</a> |
            <a href="/change_lang/ar" class="lang-toggle">عربي</a>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="login-form" onsubmit="return validateForm()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">{{ _('Username') }}</label>
                <input type="text" id="username" name="username" required 
                       onkeyup="checkUsername(this.value)"
                       pattern="[a-zA-Z0-9_]+" 
                       title="Username can only contain letters, numbers, and underscores"
                       minlength="2">
            </div>
            <div class="form-group">
                <label for="password">{{ _('Password') }}</label>
                <input type="password" id="password" name="password" required minlength="6">
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
                    <span id="password-toggle-icon">🔒</span>
                </button>
            </div>
            <input type="hidden" id="db_key" name="db_key" value="default">
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            <button type="submit" class="login-button">{{ _('Login') }}</button>
        </form>
    </div>
</body>
</html>
