{# Floating Action Button — mobile only #}
<div class="fab-container" id="fabContainer">

  {# Speed-dial actions (shown above FAB when open) #}
  <div class="fab-actions">

    <button class="fab-action" onclick="openQuickAdd()">
      <span class="fab-action-label">{{ _('Add Customer') }}</span>
      <div class="fab-action-btn color-blue">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
      </div>
    </button>

    <a href="{{ url_for('customers.add_customer') }}" class="fab-action">
      <span class="fab-action-label">{{ _('Full Customer Form') }}</span>
      <div class="fab-action-btn color-green">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
    </a>

    <a href="/quotations/new" class="fab-action">
      <span class="fab-action-label">{{ _('New Quotation') }}</span>
      <div class="fab-action-btn color-purple">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      </div>
    </a>

  </div>

  {# Main FAB button #}
  <button class="fab-main" id="fabMain" aria-label="{{ _('Quick actions') }}">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

</div>

{# Quick-add customer modal #}
<div class="quick-modal-overlay" id="quickAddOverlay">
  <div class="quick-modal" role="dialog" aria-modal="true" aria-label="{{ _('Add Customer') }}">
    <div class="quick-modal-title">
      <span>⚡ {{ _('Quick Add Customer') }}</span>
      <button class="quick-modal-close" id="quickAddClose" aria-label="{{ _('Close') }}">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="quickAddForm" novalidate>
      <input class="qm-input" id="qaName"  type="text"  name="name"
             placeholder="{{ _('Company / Customer name *') }}" required autocomplete="off">
      <input class="qm-input" id="qaPhone" type="tel"   name="phone"
             placeholder="{{ _('Phone number') }}" autocomplete="tel">
      <button class="qm-submit" id="quickAddSubmit" type="submit"
              data-label="{{ _('Save Customer') }}">
        {{ _('Save Customer') }}
      </button>
    </form>
  </div>
</div>
